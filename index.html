<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>EduScan - OCR学習アプリ</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
  body {
    font-family: "Yu Gothic", sans-serif;
    padding: 20px;
    background: #f7f7f7;
    margin: 0;
  }

  /* キーキャップ数字 */
  .keycap {
    font-size: 32px;
    font-weight: bold;
    display: inline-block;
    margin-right: 6px;
  }

  #intro {
    white-space: pre-wrap;
    margin: 15px 0;
    padding: 10px;
    background: #fff;
    border-left: 4px solid #4a90e2;
    font-size: 18px;
  }

  .cards {
    display: flex;
    gap: 8px;
    margin: 10px 0;
    flex-wrap: wrap;
  }

  .card {
    padding: 12px 16px;
    border: 2px solid #444;
    border-radius: 8px;
    background: linear-gradient(180deg, #fff, #f0f0f0);
    font-size: 20px;
    font-weight: bold;
    box-shadow: 2px 2px 4px rgba(0,0,0,0.2);
  }

  .problem {
    border: 1px solid #ccc;
    padding: 12px;
    margin: 10px 0;
    border-radius: 6px;
    background: #fff;
    font-size: 18px;
  }

  /* ボタン */
  .btn {
    width: 100%;
    padding: 12px;
    margin: 6px 0;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
  }

  .btn-answer {
    background: #4a90e2;
    color: white;
  }

  .btn-explain {
    background: #50b36a;
    color: white;
  }

  .btn-outline {
    background: #fff;
    border: 1px solid #4a90e2;
    color: #4a90e2;
  }

  @media (min-width: 768px) {
    .btn-row {
      display: flex;
      gap: 10px;
    }
    .btn {
      width: auto;
      flex: 1;
    }
  }

  .hidden {
    display: none;
  }

  .section-title {
    margin-top: 20px;
    font-weight: bold;
  }

  .answer-box, .explain-box {
    margin-top: 10px;
    padding: 10px;
    background: #f0f8ff;
    border-radius: 6px;
    line-height: 1.6;
  }
</style>
</head>

<body>
  <h2>EduScan - スキャン学習アプリ</h2>

  <input type="file" id="fileInput"><br><br>
  <button class="btn btn-answer" onclick="send()">問題文を送信</button>

  <div class="section-title">全問まとめて</div>
  <div class="btn-row">
    <button class="btn btn-answer" onclick="toggleAll('answer')">全問の解答を見る</button>
    <button class="btn btn-explain" onclick="toggleAll('explain')">全問の解説を見る</button>
  </div>

  <div id="intro"></div>
  <div class="cards" id="cards"></div>
  <div id="problems"></div>

<script>
const TAGGING_PROMPT = `
あなたは中学受験算数の専門家です。

以下の算数問題を、次の「公式単元タグ体系」に基づいて分類してください。
最も適切なタグを1〜3個返してください。
タグは必ず下記の一覧から選んでください。

【公式単元タグ体系】
- planting（植木算）
- arrangement（配列算）
- combinatorics（組合せ算）
- logic（推理）
- sum_difference（和差算）
- difference_split（差分け算）
- system（つるかめ算）
- surplus（過不足算）
- average（平均算）
- elimination（消去算）
- age（年齢算）
- distribution（分配算）
- price（定価算）
- tax（税算）
- proportion（相当算）
- concentration（濃度算）
- work（仕事算）
- total（のべ算）
- water（水量変化）
- speed_graph（速さグラフ）
- quantity_change（量と変化）

【出力形式】
JSON の配列で返してください（例：["work", "average"]）

【問題】
`;
async function getTags(question) {
  const prompt = TAGGING_PROMPT + question;
  const result = await callAI(prompt);

  try {
    return JSON.parse(result);
  } catch (e) {
    console.error("タグの JSON 解析に失敗:", result);
    return [];
  }
}  
  /* キーキャップ数字の装飾 */
function decorateKeycaps(text) {
  return text.replace(/([0-9⃣🔟]+)/g, match => {
    if (match.includes("⃣") || match === "🔟") {
      return `<span class="keycap">${match}</span>`;
    }
    return match;
  });
}

function toggle(id) {
  const el = document.getElementById(id);
  el.classList.toggle("hidden");
}

function toggleAll(type) {
  const elements = document.querySelectorAll(`.${type}-box`);
  elements.forEach(el => el.classList.toggle("hidden"));
}

async function send() {
  const file = document.getElementById("fileInput").files[0];
  if (!file) {
    alert("画像を選んでください");
    return;
  }

  const reader = new FileReader();
  reader.onload = async () => {
    const base64 = reader.result.split(",")[1];

    /* ★ Cloud Run の URL（あなたの実際のURL） */
    const res = await fetch("https://visionocr-450988444553.asia-northeast1.run.app/", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ image: base64 })
    });

    const data = await res.json();

    document.getElementById("intro").innerHTML =
      decorateKeycaps(data.structured.intro);

    const cardsDiv = document.getElementById("cards");
    cardsDiv.innerHTML = "";
    data.structured.cards.forEach(n => {
      cardsDiv.innerHTML += `<div class="card">${n}</div>`;
    });

    const problemsDiv = document.getElementById("problems");
    problemsDiv.innerHTML = "";
    data.structured.problems.forEach(p => {
      problemsDiv.innerHTML += `
        <div class="problem">
          <b>(${p.id})</b><br>
          ${p.text.replace(/\n/g, "<br>")}

          <div class="btn-row">
            <button class="btn btn-answer" onclick="toggle('answer-${p.id}')">解答を見る</button>
            <button class="btn btn-explain" onclick="toggle('explain-${p.id}')">解説を見る</button>
          </div>

          <div id="answer-${p.id}" class="answer-box answer-box hidden">
            ▼ 解答：${p.answer || "（未設定）"}
          </div>

          <div id="explain-${p.id}" class="explain-box explain-box hidden">
            ▼ 解説：${p.explain || "（未設定）"}
          </div>
        </div>
      `;
    });
  };

  reader.readAsDataURL(file);
}
let data = {};

async function loadData() {
  try {
    const res = await fetch("data.json");
    data = await res.json();
    console.log("data.json 読み込み成功", data);
  } catch (e) {
    console.error("data.json の読み込みに失敗", e);
  }
}
window.onload = () => {
  loadData();
};


</script>

</body>
</html>
